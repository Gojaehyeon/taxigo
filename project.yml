name: TaxiGo
options:
  bundleIdPrefix: xyz.tntgames
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: "YES"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
  configs:
    Debug:
      CODE_SIGN_IDENTITY: "Apple Development"
    Release:
      CODE_SIGN_IDENTITY: "Apple Development"

targets:
  TaxiGo:
    type: application
    platform: iOS
    sources:
      - path: Sources/TaxiGo
    resources:
      - path: Sources/TaxiGo/Resources/Assets.xcassets
        optional: true
    info:
      path: Sources/TaxiGo/Resources/Info.plist
      properties:
        CFBundleDisplayName: TaxiGo
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - armv7
        NSLocationWhenInUseUsageDescription: "주행 거리를 재서 장난스러운 택시 영수증을 만들어 드립니다. 위치 정보는 기기 밖으로 나가지 않습니다."
        UIBackgroundModes: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.tntgames.taxigo
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_FILE: Sources/TaxiGo/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"

  TaxiGoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/TaxiGoTests
    dependencies:
      - target: TaxiGo
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TaxiGo.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/TaxiGo"
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: xyz.tntgames.taxigo.tests

schemes:
  TaxiGo:
    build:
      targets:
        TaxiGo: all
        TaxiGoTests: [test]
    test:
      targets:
        - TaxiGoTests
      gatherCoverageData: true
    run:
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
